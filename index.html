<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Barcelone par quartiers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--ink:#0e131a;--ink2:#141b25;--card:#171f2b;--line:#283342;--txt:#e9edf3;--mut:#9aa7b8;--gold:#d8b26a;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--ink);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
.app{display:grid;grid-template-columns:1fr;grid-template-areas:"head" "map" "ctrl" "panel" "foot";}
#map{grid-area:map;height:52vh;position:sticky;top:0;z-index:1;background:#0a0e14}
.hd{grid-area:head;padding:16px 16px 12px;border-bottom:1px solid var(--line);background:var(--ink2)}
.ctrl{grid-area:ctrl;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--ink2)}
.panel{grid-area:panel;padding:14px 16px 24px;min-height:30vh}
.foot{grid-area:foot;padding:14px 16px 26px;color:var(--mut);font-size:12px;line-height:1.5;border-top:1px solid var(--line)}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:0 0 4px}
h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:23px;line-height:1.15;margin:0 0 8px}
.thesis{color:var(--mut);font-size:13.5px;line-height:1.55;margin:0}
.langbar{display:flex;gap:6px;margin:0 0 10px}
.langbar button{flex:0 0 auto;background:#0e1622;border:1px solid var(--line);color:var(--mut);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer}
.langbar button.on{background:var(--gold);border-color:var(--gold);color:#1a1206}
.sub{font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin:0 0 8px}
.ramp{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px}
.ramp .c{display:inline-flex;align-items:center;gap:6px;background:#0e1622;border:1px solid var(--line);padding:5px 10px;border-radius:999px;font-size:12px;cursor:pointer;color:var(--txt)}
.ramp .c .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.ramp .c.off{opacity:.38}
.ramp .c.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.btns{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
.btns button{background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:7px 12px;border-radius:8px;font-size:12.5px;cursor:pointer;font-weight:600}
.btns button.gold{border-color:var(--gold);color:var(--gold)}
.search{position:relative;margin:0 0 12px}
.search input{width:100%;background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:9px;font-size:13.5px;outline:none}
.search input:focus{border-color:var(--gold)}
#results{margin-top:6px;display:flex;flex-direction:column;gap:4px}
#results button{display:flex;justify-content:space-between;align-items:center;gap:10px;text-align:left;background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:8px 11px;border-radius:8px;font-size:13px;cursor:pointer}
#results button:hover{border-color:var(--gold)}
#results .rd{color:var(--mut);font-size:11px;flex:0 0 auto}
#results .none{color:var(--mut);font-size:12.5px;padding:6px 2px}
.legend{display:flex;flex-direction:column;gap:6px}
.legend .r{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut)}
.legend .sw{width:18px;height:0;border-top-width:4px;border-top-style:solid;flex:0 0 18px;border-radius:2px}
.legend .star{color:var(--gold);font-size:15px;line-height:1;flex:0 0 18px;text-align:center}
.legend .gold-box{width:14px;height:14px;border:2px solid var(--gold);border-radius:3px;flex:0 0 14px}
.legend .me{width:13px;height:13px;border-radius:50%;background:#3b82f6;border:2px solid #cfe0ff;flex:0 0 13px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 0}
.chip{background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:6px 11px;border-radius:999px;font-size:12px;cursor:pointer}
.chip.off{opacity:.34}
.chip.sel{background:var(--gold);border-color:var(--gold);color:#1a1206;font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.card .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.03em;padding:4px 10px;border-radius:999px;color:#10141b;margin:0 0 10px}
.card h2{font-family:Georgia,serif;font-size:21px;margin:0 0 6px;line-height:1.15}
.card .meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--mut);font-size:12.5px;margin:0 0 14px}
.card .stars{color:var(--gold);letter-spacing:2px}
.card h3{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);margin:14px 0 5px}
.card p{margin:0;font-size:14px;line-height:1.6;color:#dde3ec}
.card .go{display:inline-flex;align-items:center;gap:7px;margin-top:16px;background:#0e1622;border:1px solid var(--gold);color:var(--gold);padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none}
.placeholder{color:var(--mut);font-size:14px;line-height:1.6;border:1px dashed var(--line);border-radius:14px;padding:22px}
.poi-star{color:var(--gold);font-size:19px;line-height:19px;text-shadow:0 0 3px #000,0 1px 2px #000;text-align:center}
.me-dot{width:16px;height:16px;border-radius:50%;background:#3b82f6;border:3px solid #dbe7ff;box-shadow:0 0 0 4px rgba(59,130,246,.35)}
.leaflet-popup-content-wrapper{background:var(--card);color:var(--txt);border-radius:10px;border:1px solid var(--line)}
.leaflet-popup-tip{background:var(--card);border:1px solid var(--line)}
.leaflet-popup-content{margin:11px 13px;font-size:13px;line-height:1.5}
.leaflet-popup-content b{font-size:14px}
.pop-d{color:var(--gold);font-size:12px}
.pop-go{display:inline-block;margin-top:9px;background:#0e1622;border:1px solid var(--gold);color:var(--gold);padding:6px 11px;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none}
.leaflet-bar a{background:#171f2b;color:var(--txt);border-bottom:1px solid var(--line)}
.leaflet-bar a:hover{background:#222c3a}
.locbtn{font-size:17px;font-weight:700;line-height:30px}
#toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#0b1119;border:1px solid var(--gold);color:var(--txt);padding:11px 15px;border-radius:10px;font-size:13px;max-width:88%;box-shadow:0 8px 28px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s;z-index:9999;text-align:center}
#toast.show{opacity:1}
@media(min-width:900px){
 .app{grid-template-columns:1fr 470px;grid-template-areas:"map head" "map ctrl" "map panel" "map foot";align-items:start}
 #map{height:100vh;top:0}
 h1{font-size:27px}
}
@media(prefers-reduced-motion:reduce){.me-dot{box-shadow:0 0 0 3px rgba(59,130,246,.3)}}
</style>
</head>

  <div class="ramp" id="ramp"></div>

  <p class="sub" id="t-note"></p>
  <div class="legend" id="legend"></div>
  <div class="chips" id="chips"></div>

 <section class="panel"><div id="panel"></div></section>
 <footer class="foot" id="t-foot"></footer>
</div>

, cachée et silencieuse.", "ver": "Oui pour le décor médiéval, mais l'expérience est appauvrie par la densité touristique. À traverser plutôt qu'à vivre."}, "es": {"hab": "Muy pocos residentes permanentes, muchos pisos turísticos, población de paso y algunos vecinos mayores o acomodados.", "his": "Corazón de la Barcino romana y luego de la ciudad medieval. Parte de las fachadas se « medievalizó » a principios del siglo XX para los visitantes.", "fai": "La catedral, los restos de la muralla romana y el laberinto de callejuelas, mejor temprano antes del gentío.", "pos": "La Plaça Reial bajo los soportales, o la Plaça de Sant Felip Neri, escondida y silenciosa.", "ver": "Sí por el decorado medieval, pero la experiencia se empobrece por la masificación. Más para cruzar que para vivir."}}, "raval": {"name": {"fr": "El Raval", "es": "El Raval"}, "cat": "populaire", "interest": 5, "dist": "Ciutat Vella", "fr": {"hab": "Le quartier le plus cosmopolite, forte immigration pakistanaise, philippine, maghrébine et latino-américaine, étudiants et artistes, et des poches de précarité.", "his": "Ancien quartier des couvents, puis faubourg ouvrier et « barrio chino » (quartier chinois) mal famé, remodelé depuis les années 1990 par de grands musées.", "fai": "Le MACBA (musée d'art contemporain de Barcelone), la Rambla del Raval et une vie nocturne dense.", "pos": "La Plaça dels Àngels (place des Anges) devant le MACBA, vaste et animée par les skateurs.", "ver": "Oui pour qui cherche le Barcelone réel et métissé. Certaines rues restent difficiles la nuit."}, "es": {"hab": "El barrio más cosmopolita, fuerte inmigración pakistaní, filipina, magrebí y latinoamericana, estudiantes y artistas, y bolsas de precariedad.", "his": "Antiguo barrio de conventos, luego arrabal obrero y « barrio chino » de mala fama, transformado desde los años 1990 por grandes museos.", "fai": "El MACBA (museo de arte contemporáneo de Barcelona), la Rambla del Raval y una vida nocturna intensa.", "pos": "La Plaça dels Àngels frente al MACBA, amplia y animada por los patinadores.", "ver": "Sí para quien busca la Barcelona real y mestiza. Algunas calles siguen siendo difíciles de noche."}}, "ribera": {"name": {"fr": "El Born (La Ribera)", "es": "El Born (La Ribera)"}, "cat": "aise", "interest": 5, "dist": "Ciutat Vella", "fr": {"hab": "Population aisée et internationale, jeunes cadres, expatriés et résidences secondaires, peu de familles populaires d'origine.", "his": "Quartier des marchands au Moyen Âge, longtemps populaire, devenu après 2000 un symbole de la gentrification barcelonaise.", "fai": "Le musée Picasso, la basilique Santa Maria del Mar (Sainte-Marie de la Mer) et l'ancien marché du Born transformé en centre culturel.", "pos": "Le passeig del Born et les terrasses autour de Santa Maria del Mar.", "ver": "Oui sans réserve, l'un des secteurs les plus agréables du centre, dense en patrimoine et en bonnes adresses."}, "es": {"hab": "Población acomodada e internacional, jóvenes profesionales, expatriados y segundas residencias, pocas familias populares de origen.", "his": "Barrio de mercaderes en la Edad Media, mucho tiempo popular, convertido tras 2000 en símbolo de la gentrificación barcelonesa.", "fai": "El museo Picasso, la basílica de Santa Maria del Mar y el antiguo mercado del Born reconvertido en centro cultural.", "pos": "El passeig del Born y las terrazas en torno a Santa Maria del Mar.", "ver": "Sí sin reservas, uno de los sectores más agradables del centro, denso en patrimonio y buenas direcciones."}}, "barceloneta": {"name": {"fr": "La Barceloneta", "es": "La Barceloneta"}, "cat": "populaire", "interest": 5, "dist": "Ciutat Vella", "fr": {"hab": "Une vieille population de pêcheurs et d'ouvriers du port subsiste, concurrencée par les touristes et les locations saisonnières, d'où des tensions récurrentes.", "his": "La Barceloneta (la petite Barcelone) fut créée au XVIIIe siècle pour reloger les habitants chassés de la Ribera, transformée par l'ouverture des  Casa Batlló, joyas del modernismo.", "pos": "Las terrazas del Passeig de Gràcia, o un café de esquina del Eixample.", "ver": "Sí, parada obligada por la arquitectura, pese a unos alrededores saturados y precios altos."}}, "sant_antoni": {"name": {"fr": "Sant Antoni", "es": "Sant Antoni"}, "cat": "mixte", "interest": 4, "dist": "l'Eixample", "fr": {"hab": "Mélange d'habitants anciens de classe moyenne et d'une nouvelle population de jeunes actifs et d'expatriés, un front actif de la gentrification.", "his": "Partie longtemps modeste de l'Eixample (l'extension), organisée autour de son marché couvert, devenue branchée après sa rénovation achevée en 2018.", "fai": "Le marché de Sant Antoni, ses étals de livres anciens le dimanche, les terrasses et les bars à tapas.", "pos": "Les abords du marché et les terrasses de la rue Parlament.", "ver": "Oui pour l'ambiance de quartier vivant et les bonnes tables, sans monument majeur."}, "es": {"hab": "Mezcla de vecinos antiguos de clase media y de una nueva población joven y de expatriados, un frente activo de la gentrificación.", "his": "Parte mucho tiempo modesta del Eixample, organizada en torno a su mercado cubierto, puesta de moda tras su reforma terminada en 2018.", "fai": "El mercado de Sant Antoni, sus puestos de libros antiguos el domingo, las terrazas y los bares de tapas.", "pos": "Los alrededores del mercado y las terrazas de la calle Parlament.", "ver": "Sí por el ambiente de barrio vivo y la buena mesa, sin monumento mayor."}}, "eixample_esq": {"name": {"fr": "Esquerra de l'Eixample (Eixample gauche)", "es": "Esquerra de l'Eixample (Eixample izquierdo)"}, "cat": "aise", "interest": 3, "dist": "l'Eixample", "fr": {"hab": "Classe moyenne supérieure et beaucoup d'étudiants autour de l'université et des hôpitaux, avec le Gaixample (Eixample gay), centre de la vie LGBT.", "his": "Moitié ouest de l'Eixample (l'extension), longtemps occupée par de grands équipements, hôpital, université, anciens abattoirs, puis densément r né au XIXe siècle au pied de Montjuïc, lié au théâtre de l'avenue du Paral·lel (le Parallèle).", "fai": "L'avenue du Paral·lel et, juste au-dessus sur Montjuïc, le MNAC, la Fondation Miró et le château.", "pos": "Les bancs des jardins de Montjuïc, juste au-dessus.", "ver": "Oui, surtout en soirée, et comme porte d'entrée vers les musées de Montjuïc."}, "es": {"hab": "Barrio popular y mucho tiempo inmigrante, en aburguesamiento, donde conviven familias obreras, estudiantes y recién llegados.", "his": "El Poble-sec, barrio obrero nacido en el siglo XIX al pie de Montjuïc, ligado al teatro de la avenida del Paral·lel.", "fai": "La avenida del Paral·lel y, justo encima en Montjuïc, el MNAC, la Fundació Miró y el castillo.", "pos": "Los bancos de los jardines de Montjuïc, justo encima.", "ver": "Sí, sobre todo de noche, y como puerta de entrada a los museos de Montjuïc."}}, "sants": {"name": {"fr": "Sants", "es": "Sants"}, "cat": "populaire", "interest": 3, "dist": "Sants-Montjuïc", "fr": {"hab": "Quartier ouvrier et ferroviaire, classes moyennes et populaires, tissu associatif fort et très peu de tourisme.", "his": "Sants (les Saints), ancien bourg industriel absorbé par la ville, marqué par l'histoire ouvrière et coopérative.", "fai": "Peu de monuments, mais des fêtes de rue réputées, des marchés et une vie de quartier authentique.", "pos": "Les Jardins de la Indústria et la place de Sants.", "ver": "Pour le voyageur pressé non, pour qui veut un Barcelone ordinaire et habité oui."}, "es": {"hab": "Barrio obrero y ferroviario, clases medias y populares, fuerte tejido asociativo y muy poco turismo.", "his": "Sants, antiguo pueblo industrial absorbido por la ciudad, marcado por la historia obrera y cooperativa.", "fai": "Pocos monumentos, pero fiestas de calle famosas, mercados y una vida de barrio auténtica.", "pos": "Los Jardins de la Indústria y la plaza de Sants.", "ver": "Para el viajero con prisa no, para quien busca una Barcelona corriente y habitada sí."}}, "hos let LANG='fr';
try{const s=localStorage.getItem('bcn_lang');if(s==='fr'||s==='es')LANG=s;}catch(e){}
const dir=(lat,lng)=>'https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng;
const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
function catColor(c){return CATS[c].color;}
function T(){return UI[LANG];}
function nameOf(id){return INFO[id].name[LANG];}
function fmtDist(km){return km<1?Math.round(km*1000)+' m':(Math.round(km*10)/10).toString().replace('.',',')+' km';}

// ---- carte ----
const map=L.map('map',{zoomControl:true,scrollWheelZoom:true}).fitBounds(BOUNDS);
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Esri'});
const light=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,attribution:'CARTO'});
sat.addTo(map);
let satWarned=false;
sat.on('tileerror',()=>{if(!satWarned){satWarned=true;toast(T().toast_sat_fail);}});

const hoverable=window.matchMedia('(hover:hover)').matches;
let selId=null, activeCat=null, mustOnly=false;
const centers={};

function baseStyle(f){const p=f.properties;const gold=p.interest===5;return{color:gold?'#d8b26a':catColor(p.cat),weight:p.key?(gold?2.4:1.6):1.0,opacity:p.key?1:0.55,fillColor:catColor(p.cat),fillOpacity:0.42};}
const DIM={color:'#3a4150',weight:0.6,opacity:0.5,fillColor:'#2a2f3a',fillOpacity:0.22};
function selStyle(p){return{color:'#ffffff',weight:3,opacity:1,fillColor:catColor(p.cat),fillOpacity:0.6};}
function isDim(p){if(mustOnly&&p.interest!==5)return true;if(activeCat&&p.cat!==activeCat)return true;return false;}
function styleFor(l){const p=l.feature.properties;if(p.id===selId)return selStyle(p);if(isDim(p))return DIM;return baseStyle(l.feature);}

const gj=L.geoJSON(FEATS,{
 style:f=>baseStyle(f),
 onEachFeature:(f,l)=>{
  centers[f.properties.id]=l.getBounds().getCenter();
  l.on('click',()=>{select(f.properties.id);});
  if(hoverable){
   l.on('mouseover',()=>{if(f.properties.id!==selId&&!isDim(f.properties))l.setStyle({weight:2.2,color:'#ffffff'});});
   l.on('mouseout',()=>{l.setStyle(styleFor(l));});
  }
 }
}).addTo(map);

function refresh(){gj.eachLayer(l=>l.setStyle(styleFor(l)));updateChips();}

// ---- POIs ----
const starIcon=L.divIcon({className:'',html:'<div class="poi-star">★</div>',iconSize:[20,20],iconAnchor:[10,10]});
const poiLayer=L.layerGroup();
const poiMarkers=[];
POIS.forEach((p,idx)=>{
 const m=L.marker([p.lat,p.lng],{icon:starIcon});
 m.bindPopup(()=>{
  let d='';
  if(mePos){d='<br><span class="pop-d">'+fmtDist(haversine(mePos.lat,mePos.lng,p.lat,p.lng))+' '+T().dist_you+'</span>';}
  return '<b>'+p.name[LANG]+'</b><br>'+p.desc[LANG]+d+'<br><a class="pop-go" target="_blank" rel="noopener" href="'+dir(p.lat,p.lng)+'">'+T().poi_go+'</a>';
 },{maxWidth:240});
 poiLayer.addLayer(m);poiMarkers.push(m);
});
poiLayer.addTo(map);

// ---- rues ----
const streetLayers={tour:L.layerGroup(),calme:L.layerGroup(),scoot:L.layerGroup()};
STREETS.forEach(s=>{
 const pl=L.polyline(s.coords,{color:STREETCOL[s.cat],weight:8,opacity:0.5,lineCap:'round',lineJoin:'round'});
 pl.bindPopup(()=>'<b>'+s.name[LANG]+'</b><br>'+s.note[LANG],{maxWidth:230});
 streetLayers[s.cat].addLayer(pl);
});
streetLayers.tour.addTo(map);streetLayers.calme.addTo(map);streetLayers.scoot.addTo(map);

// ---- ma position ----
const locLayer=L.layerGroup().addTo(map);
const meIcon=L.divIcon({className:'',html:'<div class="me-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]});
let mePos=null, meMarker=null, placing=false;
function setMe(lat,lng){mePos={lat,lng};if(meMarker)meMarker.setLatLng([lat,lng]);else{meMarker=L.marker([lat,lng],{icon:meIcon});locLayer.addLayer(meMarker);}if(selId)renderCard(selId);}
function locate(then){
 toast(T().toast_locating);
 if(!navigator.geolocation){placing=true;toast(T().toast_loc_fail);return;}
 navigator.geolocation.getCurrentPosition(
  pos=>{setMe(pos.coords.latitude,pos.coords.longitude);map.setView([pos.coords.latitude,pos.coords.longitude],15);toast(T().toast_loc_ok);if(then)then();},
  ()=>{placing=true;toast(T().toast_loc_fail);},
  {enableHighAccuracy:true,timeout:8000});
}
map.on('click',e=>{if(placing){setMe(e.latlng.lat,e.latlng.lng);placing=false;toast(T().toast_loc_ok);}});

function haversine(a,b,c,d){const R=6371,r=Math.PI/180;const u=(c-a)*r,v=(d-b)*r;const x=Math.sin(u/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(v/2)**2;return 2*R*Math.asin(Math.sqrt(x));}
function gotoNearest(){
 const go=()=>{
  let bi=-1,bd=1e9;
  POIS.forEach((p,idx)=>{const dd=haversine(mePos.lat,mePos.lng,p.lat,p.lng);if(dd<bd){bd=dd;bi=idx;}});
  if(bi<0)return;
  const p=POIS[bi];
  if(!map.hasLayer(poiLayer))poiLayer.addTo(map);
  map.setView([p.lat,p.lng],15);
  poiMarkers[bi].openPopup();
  toast(T().nearest_found+p.name[LANG]+' ('+fmtDist(bd)+')');
  window.open(dir(p.lat,p.lng),'_blank');
 };
 if(mePos){go();return;}
 if(!navigator.geolocation){placing=true;toast(T().toast_need_pos);return;}
 toast(T().toast_locating);
 navigator.geolocation.getCurrentPosition(
  pos=>{setMe(pos.coords.latitude,pos.coords.longitude);go();},
  ()=>{placing=true;toast(T().toast_need_pos);},
  {enableHighAccuracy:true,timeout:8000});
}

// ---- controles carte ----
L.control.zoom&&map.zoomControl.setPosition('topleft');
let locA=null,nearA=null,allA=null;
const LocCtl=L.Control.extend({options:{position:'topleft'},onAdd:function(){
 const t=T();const d=L.DomUtil.create('div','leaflet-bar');
 const a=L.DomUtil.create('a','locbtn',d);a.href='#';a.innerHTML='◎';a.title=t.loc_btn;a.setAttribute('aria-label',t.loc_btn);L.DomEvent.on(a,'click',e=>{L.DomEvent.stop(e);locate();});locA=a;
 const b=L.DomUtil.create('a','locbtn',d);b.href='#';b.innerHTML='★';b.title=t.nearest;b.setAttribute('aria-label',t.nearest);L.DomEvent.on(b,'click',e=>{L.DomEvent.stop(e);gotoNearest();});nearA=b;
 const c=L.DomUtil.create('a','locbtn',d);c.href='#';c.innerHTML='⤢';c.title=t.overview;c.setAttribute('aria-label',t.overview);L.DomEvent.on(c,'click',e=>{L.DomEvent.stop(e);map.fitBounds(BOUNDS);});allA=c;
 return d;}});
map.addControl(new LocCtl());

// ---- menu couches (recree au changement de langue) ----
let layerCtl=null;
function buildLayerCtl(){
 if(layerCtl)map.removeControl(layerCtl);
 const t=T();
 const bases={};bases[t.b_sat]=sat;bases[t.b_light]=light;
 const ov={};ov[t.o_poi]=poiLayer;ov[t.o_tour]=streetLayers.tour;ov[t.o_calme]=streetLayers.calme;ov[t.o_scoot]=streetLayers.scoot;ov[t.o_me]=locLayer;
 layerCtl=L.control.layers(bases,ov,{collapsed:true,position:'topright'}).addTo(map);
}

// ---- selection + fiche ----
function stars(n){let s='';for(let i=0;i<5;i++)s+=i<n?'★':'☆';return s;}
function select(id){selId=id;refresh();renderCard(id);document.querySelector('.panel').scrollIntoView({behavior:'smooth',block:'start'});}
function renderCard(id){
 const it=INFO[id],t=T(),d=it[LANG],col=catColor(it.cat),ctr=centers[id];
 let dl='';
 if(mePos&&ctr){dl='<span>·</span><span>'+fmtDist(haversine(mePos.lat,mePos.lng,ctr.lat,ctr.lng))+' '+t.dist_you+'</span>';}
 const html=
  '<div class="card">'+
  '<span class="badge" style="background:'+col+'">'+CATS[it.cat].label[LANG]+'</span>'+
  '<h2>'+it.name[LANG]+'</h2>'+
  '<div class="meta"><span class="stars">'+stars(it.interest)+'</span><span>'+t.ilabel[String(it.interest)]+'</span><span>·</span><span>'+t.district_of+' '+it.dist+'</span>'+dl+'</div>'+
  '<h3>'+t.h_hab+'</h3><p>'+d.hab+'</p>'+
  '<h3>'+t.h_his+'</h3><p>'+d.his+'</p>'+
  '<h3>'+t.h_fai+'</h3><p>'+d.fai+'</p>'+
  '<h3>'+t.h_pos+'</h3><p>'+d.pos+'</p>'+
  '<h3>'+t.h_ver+'</h3><p>'+d.ver+'</p>'+
  '<a class="go" target="_blank" rel="noopener" href="'+dir(ctr.lat,ctr.lng)+'">→ '+t.go+'</a>'+
  '</div>';
 document.getElementById('panel').innerHTML=html;
}

// ---- recherche ----
function renderSearch(){
 const box=document.getElementById('results');box.innerHTML='';
 const q=document.getElementById('q').value.trim();
 if(!q)return;
 const t=T(),nq=norm(q);
 const hits=Object.keys(INFO).filter(id=>norm(INFO[id].name[LANG]).includes(nq)).slice(0,8);
 if(!hits.length){box.innerHTML='<div class="none">'+t.search_none+'</div>';return;}
 hits.forEach(id=>{
  const b=document.createElement('button');
  b.innerHTML='<span>'+INFO[id].name[LANG]+'</span><span class="rd">'+INFO[id].dist+'</span>';
  b.onclick=()=>{select(id);document.getElementById('q').value='';box.innerHTML='';};
  box.appendChild(b);
 });
}

// ---- filtres ----
function setCat(c){activeCat=(activeCat===c?null:c);mustOnly=false;refresh();renderRamp();syncBtns();}
function toggleMust(){mustOnly=!mustOnly;activeCat=null;refresh();renderRamp();syncBtns();}
function resetFilter(){activeCat=null;mustOnly=false;refresh();renderRamp();syncBtns();}
function syncBtns(){const b=document.getElementById('b-must');b.style.background=mustOnly?'#d8b26a':'#0e1622';b.style.color=mustOnly?'#1a1206':'#d8b26a';}

// ---- rendu textes + listes ----
function renderRamp(){
 const r=document.getElementById('ramp');r.innerHTML='';
 ORDER.forEach(c=>{
  const el=document.createElement('span');el.className='c'+(activeCat===c?' active':'')+(activeCat&&activeCat!==c?' off':'');
  el.innerHTML='<span class="dot" style="background:'+CATS[c].color+'"></span>'+CATS[c].label[LANG];
  el.onclick=()=>setCat(c);r.appendChild(el);
 });
}
function renderLegend(){
 const t=T();
 document.getElementById('legend').innerHTML=
  '<div class="r"><span class="gold-box"></span>'+t.rep_gold+'</div>'+
  '<div class="r"><span class="star">★</span>'+t.rep_star+'</div>'+
  '<div class="r"><span class="sw" style="border-top-color:'+STREETCOL.tour+'"></span>'+t.rep_tour+'</div>'+
  '<div class="r"><span class="sw" style="border-top-color:'+STREETCOL.calme+'"></span>'+t.rep_calme+'</div>'+
  '<div class="r"><span class="sw" style="border-top-color:'+STREETCOL.scoot+'"></span>'+t.rep_scoot+'</div>'+
  '<div class="r"><span class="me"></span>'+t.rep_me+'</div>';
}
function renderChips(){
 const c=document.getElementById('chips');c.innerHTML='';
 FEATS.features.filter(f=>f.properties.key).forEach(f=>{
  const b=document.createElement('button');b.className='chip';b.dataset.id=f.properties.id;b.textContent=nameOf(f.properties.id);
  b.onclick=()=>select(f.properties.id);c.appendChild(b);
 });
 updateChips();
}
function updateChips(){
 document.querySelectorAll('.chip').forEach(b=>{const id=b.dataset.id,p=INFO[id];b.classList.toggle('off',isDim({cat:p.cat,interest:p.interest}));b.classList.toggle('sel',id===selId);});
}
function applyLang(){
 const t=T();
 document.documentElement.lang=LANG;
 document.getElementById('t-eyebrow').textContent=t.eyebrow;
 document.getElementById('t-h1').textContent=t.h1;
 document.getElementById('t-thesis').textContent=t.thesis;
 document.getElementById('t-soc').textContent=t.soc_title;
 document.getElementById('t-note').textContent=t.note_title;
 document.getElementById('b-must').textContent=t.fmust;
 document.getElementById('b-reset').textContent=t.freset;
 document.getElementById('t-foot').textContent=t.footer;
 document.getElementById('q').placeholder=t.search_ph;
 document.getElementById('lfr').classList.toggle('on',LANG==='fr');
 document.getElementById('les').classList.toggle('on',LANG==='es');
 if(locA){locA.title=t.loc_btn;locA.setAttribute('aria-label',t.loc_btn);}
 if(nearA){nearA.title=t.nearest;nearA.setAttribute('aria-label',t.nearest);}
 if(allA){allA.title=t.overview;allA.setAttribute('aria-label',t.overview);}
 if(!selId)document.getElementById('panel').innerHTML='<div class="placeholder">'+t.placeholder+'</div>';
 renderSearch();
}
function setLang(l){LANG=l;try{localStorage.setItem('bcn_lang',l);}catch(e){}applyLang();renderRamp();renderLegend();renderChips();buildLayerCtl();syncBtns();if(selId)renderCard(selId);if(map._popup)map.closePopup();}

// ---- toast ----
let toastT=null;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),4200);}

// ---- init ----
applyLang();renderRamp();renderLegend();renderChips();buildLayerCtl();syncBtns();
</script>
</body>
</html>

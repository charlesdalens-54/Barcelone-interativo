<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Barcelone par quartiers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--ink:#0e131a;--ink2:#141b25;--card:#171f2b;--line:#283342;--txt:#e9edf3;--mut:#9aa7b8;--gold:#d8b26a;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--ink);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
.app{display:grid;grid-template-columns:1fr;grid-template-areas:"head" "map" "ctrl" "panel" "foot";}
#map{grid-area:map;height:52vh;position:sticky;top:0;z-index:1;background:#0a0e14}
.hd{grid-area:head;padding:16px 16px 12px;border-bottom:1px solid var(--line);background:var(--ink2)}
.ctrl{grid-area:ctrl;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--ink2)}
.panel{grid-area:panel;padding:14px 16px 24px;min-height:30vh}
.foot{grid-area:foot;padding:14px 16px 26px;color:var(--mut);font-size:12px;line-height:1.5;border-top:1px solid var(--line)}
.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:0 0 4px}
h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:23px;line-height:1.15;margin:0 0 8px}
.thesis{color:var(--mut);font-size:13.5px;line-height:1.55;margin:0}
.langbar{display:flex;gap:6px;margin:0 0 10px}
.langbar button{flex:0 0 auto;background:#0e1622;border:1px solid var(--line);color:var(--mut);padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer}
.langbar button.on{background:var(--gold);border-color:var(--gold);color:#1a1206}
.sub{font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin:0 0 8px}
.ramp{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px}
.ramp .c{display:inline-flex;align-items:center;gap:6px;background:#0e1622;border:1px solid var(--line);padding:5px 10px;border-radius:999px;font-size:12px;cursor:pointer;color:var(--txt)}
.ramp .c .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.ramp .c.off{opacity:.38}
.ramp .c.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.btns{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 12px}
.btns button{background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:7px 12px;border-radius:8px;font-size:12.5px;cursor:pointer;font-weight:600}
.btns button.gold{border-color:var(--gold);color:var(--gold)}
.search{position:relative;margin:0 0 12px}
.search input{width:100%;background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:9px;font-size:13.5px;outline:none}
.search input:focus{border-color:var(--gold)}
#results{margin-top:6px;display:flex;flex-direction:column;gap:4px}
#results button{display:flex;justify-content:space-between;align-items:center;gap:10px;text-align:left;background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:8px 11px;border-radius:8px;font-size:13px;cursor:pointer}
#results button:hover{border-color:var(--gold)}
#results .rd{color:var(--mut);font-size:11px;flex:0 0 auto}
#results .none{color:var(--mut);font-size:12.5px;padding:6px 2px}
.legend{display:flex;flex-direction:column;gap:6px}
.legend .r{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut)}
.legend .sw{width:18px;height:0;border-top-width:4px;border-top-style:solid;flex:0 0 18px;border-radius:2px}
.legend .star{color:var(--gold);font-size:15px;line-height:1;flex:0 0 18px;text-align:center}
.legend .gold-box{width:14px;height:14px;border:2px solid var(--gold);border-radius:3px;flex:0 0 14px}
.legend .me{width:13px;height:13px;border-radius:50%;background:#3b82f6;border:2px solid #cfe0ff;flex:0 0 13px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 0}
.chip{background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:6px 11px;border-radius:999px;font-size:12px;cursor:pointer}
.chip.off{opacity:.34}
.chip.sel{background:var(--gold);border-color:var(--gold);color:#1a1206;font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.card .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.03em;padding:4px 10px;border-radius:999px;color:#10141b;margin:0 0 10px}
.card h2{font-family:Georgia,serif;font-size:21px;margin:0 0 6px;line-height:1.15}
.card .meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--mut);font-size:12.5px;margin:0 0 14px}
.card .stars{color:var(--gold);letter-spacing:2px}
.card h3{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);margin:14px 0 5px}
.card p{margin:0;font-size:14px;line-height:1.6;color:#dde3ec}
.card .go{display:inline-flex;align-items:center;gap:7px;margin-top:16px;background:#0e1622;border:1px solid var(--gold);color:var(--gold);padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none}
.placeholder{color:var(--mut);font-size:14px;line-height:1.6;border:1px dashed var(--line);border-radius:14px;padding:22px}
.poi-star{color:var(--gold);font-size:19px;line-height:19px;text-shadow:0 0 3px #000,0 1px 2px #000;text-align:center}
.me-dot{width:16px;height:16px;border-radius:50%;background:#3b82f6;border:3px solid #dbe7ff;box-shadow:0 0 0 4px rgba(59,130,246,.35)}
.leaflet-popup-content-wrapper{background:var(--card);color:var(--txt);border-radius:10px;border:1px solid var(--line)}
.leaflet-popup-tip{background:var(--card);border:1px solid var(--line)}
.leaflet-popup-content{margin:11px 13px;font-size:13px;line-height:1.5}
.leaflet-popup-content b{font-size:14px}
.pop-d{color:var(--gold);font-size:12px}
.pop-go{display:inline-block;margin-top:9px;background:#0e1622;border:1px solid var(--gold);color:var(--gold);padding:6px 11px;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none}
.leaflet-bar a{background:#171f2b;color:var(--txt);border-bottom:1px solid var(--line)}
.leaflet-bar a:hover{background:#222c3a}
.locbtn{font-size:17px;font-weight:700;line-height:30px}
#toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#0b1119;border:1px solid var(--gold);color:var(--txt);padding:11px 15px;border-radius:10px;font-size:13px;max-width:88%;box-shadow:0 8px 28px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s;z-index:9999;text-align:center}
#toast.show{opacity:1}
.plan{margin:0 0 12px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#0e1622}
.plan .sub{margin:0 0 9px;color:var(--gold)}
.plan-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:0 0 8px}
.plan-row label{font-size:12px;color:var(--mut)}
.plan-row input[type=time],.plan-row select{background:#0b121c;border:1px solid var(--line);color:var(--txt);padding:6px 8px;border-radius:7px;font-size:13px}
.seg{display:flex;flex-wrap:wrap;gap:5px}
.seg-b{background:#0b121c;border:1px solid var(--line);border-radius:7px;color:var(--mut);padding:6px 11px;font-size:12.5px;font-weight:600;cursor:pointer}
.seg-b.on{background:var(--gold);color:#1a1206}
#b-plan{background:#0e1622;border:1px solid var(--gold);color:var(--gold);padding:8px 13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
#b-plan-clear{background:#0e1622;border:1px solid var(--line);color:var(--txt);padding:8px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.plan-list{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:9px}
.plan-list li{display:block;border-left:2px solid var(--gold);padding:0 0 0 11px}
.plan-list .ph{color:var(--gold);font-weight:700;font-size:13px;margin-right:7px}
.plan-list .pd{color:var(--mut);font-size:12px}
.plan-list .phr{color:var(--mut);font-size:11.5px}
.plan-list .pcr{color:#c9a86a;font-size:11.5px}
.plan-list .pg{display:inline-block;margin-top:3px;color:#1a1206;background:var(--gold);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700}
.poi-dot{width:15px;height:15px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.55),0 1px 3px rgba(0,0,0,.5)}
.catchips{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px}
.catchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#0e1622;color:var(--txt);padding:5px 9px;border-radius:20px;font-size:12px;cursor:pointer;user-select:none;transition:opacity .15s}
.catchip .cdot{width:10px;height:10px;border-radius:50%}
.catchip.off{opacity:.34}
.pop-dur{display:flex;align-items:center;gap:6px;margin:7px 0 3px;color:var(--mut);font-size:12px}
.pop-dur input{width:58px;background:#0b121c;border:1px solid var(--line);color:var(--txt);padding:3px 6px;border-radius:6px;font-size:12px}
.pcat{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:10px;color:#0c0c0c;font-weight:700;vertical-align:middle}
.psk{color:var(--mut);font-size:12px;margin:12px 0 0;line-height:1.5}
.pnote{color:var(--mut);font-size:11.5px;margin:8px 0 0;font-style:italic}
.num{width:26px;height:26px;border-radius:50%;background:#f0a020;color:#1a1206;font-weight:800;font-size:13px;line-height:26px;text-align:center;border:2px solid #1a1206;box-shadow:0 1px 4px rgba(0,0,0,.6)}
@media(min-width:900px){
 .app{grid-template-columns:1fr 470px;grid-template-areas:"map head" "map ctrl" "map panel" "map foot";align-items:start}
 #map{height:100vh;top:0}
 h1{font-size:27px}
}
@media(prefers-reduced-motion:reduce){.me-dot{box-shadow:0 0 0 3px rgba(59,130,246,.3)}}
</style>
</head>
<body>
<div class="app">
 <header class="hd">
  <div class="langbar"><button id="lfr" class="on" onclick="setLang('fr')">Français</button><button id="les" onclick="setLang('es')">Español</button></div>
  <p class="eyebrow" id="t-eyebrow"></p>
  <h1 id="t-h1"></h1>
  <p class="thesis" id="t-thesis"></p>
 </header>
 <div id="map"></div>
 <section class="ctrl">
  <div class="search"><input id="q" type="text" autocomplete="off" oninput="renderSearch()"/><div id="results"></div></div>
  <p class="sub" id="t-soc"></p>
  <div class="ramp" id="ramp"></div>
  <div class="btns"><button id="b-must" class="gold" onclick="toggleMust()"></button><button id="b-reset" onclick="resetFilter()"></button></div>
  <p class="sub" id="t-cats"></p>
  <div class="catchips" id="catchips"></div>
  <div class="plan">
   <p class="sub" id="t-plan"></p>
   <div class="plan-row"><label id="lab-start"></label><input id="p-start" type="time" value="09:00"/><label id="lab-sunset"></label><input id="p-sunset" type="time" value="21:00"/></div>
   <div class="plan-row"><label id="lab-day"></label><select id="p-day"></select></div>
   <div class="plan-row"><label id="lab-mode"></label><span class="seg"><button id="m-walk" class="seg-b on" onclick="setMode('walk')"></button><button id="m-bike" class="seg-b" onclick="setMode('bike')"></button><button id="m-scooter" class="seg-b" onclick="setMode('scooter')"></button><button id="m-car" class="seg-b" onclick="setMode('car')"></button><button id="m-transit" class="seg-b" onclick="setMode('transit')"></button></span></div>
   <div class="plan-row"><button id="b-plan" onclick="runPlan()"></button><button id="b-plan-clear" onclick="clearPlan()"></button></div>
   <div id="plan-out"></div>
  </div>
  <p class="sub" id="t-note"></p>
  <div class="legend" id="legend"></div>
  <div class="chips" id="chips"></div>
 </section>
 <section class="panel"><div id="panel"></div></section>
 <footer class="foot" id="t-foot"></footer>
</div>
<div id="toast"></div>

, cachée et silencieuse.", "ver": "Oui pour le décor médiéval, mais l'expérience est appauvrie par la densité touristique. À traverser plutôt qu'à vivre."}, "es": {"hab": "Muy pocos residentes permanentes, muchos pisos turísticos, población de paso y algunos vecinos mayores o acomodados.", "his": "Corazón de la Barcino romana y luego de la ciudad medieval. Parte de las fachadas se « medievalizó » a principios del siglo XX para los visitantes.", "fai": "La catedral, los restos de la muralla romana y el laberinto de callejuelas, mejor temprano antes del gentío.", "pos": "La Plaça Reial bajo los soportales, o la Plaça de Sant Felip Neri, escondida y silenciosa.", "ver": "Sí por el decorado medieval, pero la experiencia se empobrece por la masificación. Más para cruzar que para vivir."}}, "raval": {"name": {"fr": "El Raval", "es": "El Raval"}, "cat": "populaire", "interest": 5, "dist": "Ciutat Vella", "fr": {"hab": "Le quartier le plus cosmopolite, forte immigration pakistanaise, philippine, maghrébine et latino-américaine, étudiants et artistes, et des poches de précarité.", "his": "Ancien quartier des couvents, puis faubourg ouvrier et « barrio chino » (quartier chinois) mal famé, remodelé depuis les années 1990 par de grands musées.", "fai": "Le MACBA (musée d'art contemporain de Barcelone), la Rambla del Raval et une vie nocturne dense.", "pos": "La Plaça dels Àngels (place des Anges) devant le MACBA, vaste et animée par les skateurs.", "ver": "Oui pour qui cherche le Barcelone réel et métissé. Certaines rues restent difficiles la nuit."}, "es": {"hab": "El barrio más cosmopolita, fuerte inmigración pakistaní, filipina, magrebí y latinoamericana, estudiantes y artistas, y bolsas de precariedad.", "his": "Antiguo barrio de conventos, luego arrabal obrero y « barrio chino » de mala fama, transformado desde los años 1990 por grandes museos.", "fai": "El MACBA (museo de arte contemporáneo de Barcelona), la Rambla del Raval y una vida nocturna intensa.", "pos": "La Plaça dels Àngels frente al MACBA, amplia y animada por los patinadores.", "ver": "Sí para quien busca la Barcelona real y mestiza. Algunas calles siguen siendo difíciles de noche."}}, "ribera": {"name": {"fr": "El Born (La Ribera)", "es": "El Born (La Ribera)"}, "cat": "aise", "interest": 5, "dist": "Ciutat Vella", "fr": {"hab": "Population aisée et internationale, jeunes cadres, expatriés et résidences secondaires, peu de familles populaires d'origine.", "his": "Quartier des marchands au Moyen Âge, longtemps populaire, devenu après 2000 un symbole de la gentrification barcelonaise.", "fai": "Le musée Picasso, la basilique Santa Maria del Mar (Sainte-Marie de la Mer) et l'ancien marché du Born transformé en centre culturel.", "pos": "Le passeig del Born et les terrasses autour de Santa Maria del Mar.", "ver": "Oui sans réserve, l'un des secteurs les plus agréables du centre, dense en patrimoine et en bonnes adresses."}, "es": {"hab": "Población acomodada e internacional, jóvenes profesionales, expatriados y segundas residencias, pocas familias populares de origen.", "his": "Barrio de mercaderes en la Edad Media, mucho tiempo popular, convertido tras 2000 en símbolo de la gentrificación barcelonesa.", "fai": "El museo Picasso, la basílica de Santa Maria del Mar y el antiguo mercado del Born reconvertido en centro cultural.", "pos": "El passeig del Born y las terrazas en torno a Santa Maria del Mar.", "ver": "Sí sin reservas, uno de los sectores más agradables del centro, denso en patrimonio y buenas direcciones."}}, "barceloneta": {"name": {"fr": "La Barceloneta", "es": "La Barceloneta"}, "cat": "populaire", "interest": 5, "dist": "Ciutat Vella", "fr": {"hab": "Une vieille population de pêcheurs et d'ouvriers du port subsiste, concurrencée par les touristes et les locations saisonnières, d'où des tensions récurrentes.", "his": "La Barceloneta (la petite Barcelone) fut créée au XVIIIe siècle pour reloger les habitants chassés de la Ribera, transformée par l'ouverture des plages en 1992.", "fai": "La plage, les terrasses de poisson et de paella, le front de mer et le Musée d'histoire de la Catalogne tout proche.", "pos": "Le front de mer et les bancs face à la plage.", "ver": "Oui pour la plage et le poisson, non l'été où la foule et les prix gâchent l'endroit."}, "es": {"hab": "Subsiste una vieja población de pescadores y obreros del puerto, en competencia con turistas y pisos de temporada, de ahí tensiones recurrentes.", "his": "La Barceloneta se creó en el siglo XVIII para realojar a los vecinos expulsados de la Ribera, transformada por la apertura de las playas en 1992.", "fai": "La playa, las terrazas de pescado y paella, el paseo marítimo y el Museo de Historia de Cataluña muy cerca.", "pos": "El paseo marítimo y los bancos frente a la playa.", "ver": "Sí por la playa y el pescado, no en verano cuando el gentío y los precios estropean el lugar."}}, "eixample_dreta": {"name": {"fr": "Dreta de l'Eixample (Eixample droit)", "es": "Dreta de l'Eixample (Eixample derecho)"}, "cat": "tres_aise", "interest": 5, "dist": "l'Eixample", "fr": {"hab": "Bourgeoisie installée, professions libérales et sièges sociaux, population souvent âgée et fortunée dans de grands appartements anciens.", "his": "Quartier né de l'Eixample (l'extension), tracée au XIXe siècle sur le plan en damier de Cerdà et occupée d'emblée par la haute société.", "fai": "La Sagrada Família, la Pedrera (la carrière) et la Casa Batlló, joyaux du modernisme.", "pos": "Les terrasses du Passeig de Gràcia, ou un café d'angle de l'Eixample.", "ver": "Oui, passage obligé pour l'architecture, malgré des abords saturés et des prix élevés."}, "es": {"hab": "Burguesía asentada, profesiones liberales y sedes de empresas, población a menudo mayor y adinerada en grandes pisos antiguos.", "his": "Barrio nacido del Eixample (el ensanche), trazado en el siglo XIX sobre el plano en cuadrícula de Cerdà y ocupado de inmediato por la alta sociedad.", "fai": "La Sagrada Família, la Pedrera y la Casa Batlló, joyas del modernismo.", "pos": "Las terrazas del Passeig de Gràcia, o un café de esquina del Eixample.", "ver": "Sí, parada obligada por la arquitectura, pese a unos alrededores saturados y precios altos."}}, "sant_antoni": {"name": {"fr": "Sant Antoni", "es": "Sant Antoni"}, "cat": "mixte", "interest": 4, "dist": "l'Eixample", "fr": {"hab": "Mélange d'habitants anciens de classe moyenne et d'une nouvelle population de jeunes actifs et d'expatriés, un front actif de la gentrification.", "his": "Partie longtemps modeste de l'Eixample (l'extension), organisée autour de son marché couvert, devenue branchée après sa rénovation achevée en 2018.", "fai": "Le marché de Sant Antoni, ses étals de livres anciens le dimanche, les terrasses et les bars à tapas.", "pos": "Les abords du marché et les terrasses de la rue Parlament.", "ver": "Oui pour l'ambiance de quartier vivant et les bonnes tables, sans monument majeur."}, "es": {"hab": "Mezcla de vecinos antiguos de clase media y de una nueva población joven y de expatriados, un frente activo de la gentrificación.", "his": "Parte mucho tiempo modesta del Eixample, organizada en torno a su mercado cubierto, puesta de moda tras su reforma terminada en 2018.", "fai": "El mercado de Sant Antoni, sus puestos de libros antiguos el domingo, las terrazas y los bares de tapas.", "pos": "Los alrededores del mercado y las terrazas de la calle Parlament.", "ver": "Sí por el ambiente de barrio vivo y la buena mesa, sin monumento mayor."}}, "eixample_esq": {"name": {"fr": "Esquerra de l'Eixample (Eixample gauche)", "es": "Esquerra de l'Eixample (Eixample izquierdo)"}, "cat": "aise", "interest": 3, "dist": "l'Eixample", "fr": {"hab": "Classe moyenne supérieure et beaucoup d'étudiants autour de l'université et des hôpitaux, avec le Gaixample (Eixample gay), centre de la vie LGBT.", "his": "Moitié ouest de l'Eixample (l'extension), longtemps occupée par de grands équipements, hôpital, université, anciens abattoirs, puis densément habitée.", "fai": "Surtout résidentiel, avec le marché du Ninot et l'avenue Gran Via.", "pos": "Les bancs ombragés de la rue Enric Granados.", "ver": "Peu de monuments en propre, mais un quartier central et agréable où loger."}, "es": {"hab": "Clase media alta y muchos estudiantes en torno a la universidad y los hospitales, con el Gaixample, centro de la vida LGBT.", "his": "Mitad oeste del Eixample, mucho tiempo ocupada por grandes equipamientos, hospital, universidad, antiguos mataderos, y luego densamente habitada.", "fai": "Sobre todo residencial, con el mercado del Ninot y la Gran Via.", "pos": "Los bancos con sombra de la calle Enric Granados.", "ver": "Pocos monumentos propios, pero un barrio céntrico y agradable para alojarse."}}, "sagrada_familia": {"name": {"fr": "Sagrada Família", "es": "Sagrada Família"}, "cat": "mixte", "interest": 4, "dist": "l'Eixample", "fr": {"hab": "Quartier résidentiel de classe moyenne, sous forte pression touristique autour de la basilique, qui attire commerces et locations de courte durée.", "his": "Secteur de l'Eixample (l'extension) longtemps ordinaire, transformé par le chantier de la basilique commencé en 1882.", "fai": "La basilique, et tout près l'hôpital de Sant Pau (Saint-Paul), vaste ensemble moderniste souvent oublié des visites.", "pos": "La place Gaudí, devant la basilique, côté étang.", "ver": "Oui pour la basilique et l'hôpital de Sant Pau, le reste du quartier étant banal."}, "es": {"hab": "Barrio residencial de clase media, bajo fuerte presión turística en torno a la basílica, que atrae comercios y pisos de corta estancia.", "his": "Sector del Eixample mucho tiempo corriente, transformado por las obras de la basílica iniciadas en 1882.", "fai": "La basílica, y muy cerca el hospital de Sant Pau, gran conjunto modernista a menudo olvidado por las visitas.", "pos": "La plaza Gaudí, frente a la basílica, junto al estanque.", "ver": "Sí por la basílica y el hospital de Sant Pau, siendo el resto del barrio anodino."}}, "fort_pienc": {"name": {"fr": "Fort Pienc", "es": "Fort Pienc"}, "cat": "populaire", "interest": 2, "dist": "l'Eixample", "fr": {"hab": "Quartier mixte de classe moyenne et populaire, avec une présence asiatique notable, au calme entre la gare du Nord et l'Eixample (l'extension).", "his": "Ancien secteur militaire et ferroviaire, du nom d'une forteresse disparue, urbanisé tardivement et resté discret.", "fai": "L'Arc de Triomf et le parc de la Ciutadella (la Citadelle) en bordure, la gare du Nord reconvertie en équipement sportif.", "pos": "Le parc de la Ciutadella tout proche, ou la place du Fort Pienc.", "ver": "Secondaire, surtout un quartier de passage vers la Ciutadella."}, "es": {"hab": "Barrio mixto de clase media y popular, con presencia asiática notable, tranquilo entre la Estación del Norte y el Eixample.", "his": "Antiguo sector militar y ferroviario, con el nombre de una fortaleza desaparecida, urbanizado tarde y discreto.", "fai": "El Arc de Triomf y el parque de la Ciutadella al lado, la Estación del Norte reconvertida en equipamiento deportivo.", "pos": "El parque de la Ciutadella muy cerca, o la plaza del Fort Pienc.", "ver": "Secundario, sobre todo un barrio de paso hacia la Ciutadella."}}, "gracia": {"name": {"fr": "Vila de Gràcia", "es": "Vila de Gràcia"}, "cat": "mixte", "interest": 5, "dist": "Gràcia", "fr": {"hab": "Population mêlée d'habitants historiques, de familles, d'étudiants et de milieux créatifs, esprit associatif et militant.", "his": "La Vila de Gràcia (le bourg de Gràcia), ancien village ouvrier indépendant jusqu'en 1897, foyer de républicanisme, aujourd'hui en voie d'embourgeoisement.", "fai": "Le réseau de petites places à terrasses, les cinémas, la Festa Major (grande fête) d'août et le Park Güell à la lisière haute.", "pos": "La Plaça del Sol (place du Soleil) et la Plaça de la Vila de Gràcia, vivantes le soir.", "ver": "Oui, l'un des quartiers les plus attachants, à parcourir sans but, de place en place."}, "es": {"hab": "Po let LANG='fr';
try{const s=localStorage.getItem('bcn_lang');if(s==='fr'||s==='es')LANG=s;}catch(e){}
const dir=(lat,lng)=>'https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng;
const norm=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
function catColor(c){return CATS[c].color;}
function T(){return UI[LANG];}
function nameOf(id){return INFO[id].name[LANG];}
function fmtDist(km){return km<1?Math.round(km*1000)+' m':(Math.round(km*10)/10).toString().replace('.',',')+' km';}

// ---- carte ----
const map=L.map('map',{zoomControl:true,scrollWheelZoom:true}).fitBounds(BOUNDS);
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Esri'});
const light=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,attribution:'CARTO'});
sat.addTo(map);
let satWarned=false;
sat.on('tileerror',()=>{if(!satWarned){satWarned=true;toast(T().toast_sat_fail);}});

const hoverable=window.matchMedia('(hover:hover)').matches;
let selId=null, activeCat=null, mustOnly=false;
const centers={};

function baseStyle(f){const p=f.properties;const gold=p.interest===5;return{color:gold?'#d8b26a':catColor(p.cat),weight:p.key?(gold?2.4:1.6):1.0,opacity:p.key?1:0.55,fillColor:catColor(p.cat),fillOpacity:0.42};}
const DIM={color:'#3a4150',weight:0.6,opacity:0.5,fillColor:'#2a2f3a',fillOpacity:0.22};
function selStyle(p){return{color:'#ffffff',weight:3,opacity:1,fillColor:catColor(p.cat),fillOpacity:0.6};}
function isDim(p){if(mustOnly&&p.interest!==5)return true;if(activeCat&&p.cat!==activeCat)return true;return false;}
function styleFor(l){const p=l.feature.properties;if(p.id===selId)return selStyle(p);if(isDim(p))return DIM;return baseStyle(l.feature);}

const gj=L.geoJSON(FEATS,{
 style:f=>baseStyle(f),
 onEachFeature:(f,l)=>{
  centers[f.properties.id]=l.getBounds().getCenter();
  l.on('click',()=>{select(f.properties.id);});
  if(hoverable){
   l.on('mouseover',()=>{if(f.properties.id!==selId&&!isDim(f.properties))l.setStyle({weight:2.2,color:'#ffffff'});});
   l.on('mouseout',()=>{l.setStyle(styleFor(l));});
  }
 }
}).addTo(map);

function refresh(){gj.eachLayer(l=>l.setStyle(styleFor(l)));updateChips();}

// ---- POIs (categorises, filtrables, duree reglable) ----
const POICAT={};POICATS.forEach(c=>{POICAT[c[0]]={fr:c[1],es:c[2],col:c[3]};});
const activeCats=new Set(POICATS.map(c=>c[0]));
const durOv={};
const poiLayer=L.layerGroup();
const poiMarkers=[];
function poiIcon(cat){const col=(POICAT[cat]||{}).col||'#d8b26a';return L.divIcon({className:'',html:'<div class="poi-dot" style="background:'+col+'"></div>',iconSize:[15,15],iconAnchor:[8,8]});}
function setDur(idx,v){let n=parseInt(v,10);if(isNaN(n))return;n=Math.max(5,Math.min(240,n));durOv[idx]=n;}
function poiPopup(p,idx){
 let d='';if(mePos){d='<br><span class="pop-d">'+fmtDist(haversine(mePos.lat,mePos.lng,p.lat,p.lng))+' '+T().dist_you+'</span>';}
 const cur=(durOv[idx]!=null?durOv[idx]:p.dur);
 const cc=POICAT[p.cat]||{};const tag='<span class="pcat" style="background:'+(cc.col||'#888')+'">'+(cc[LANG]||'')+'</span>';
 const crowd=p.crowd?'<br><span class="pcr">◷ '+p.crowd[LANG]+'</span>':'';
 const durRow='<div class="pop-dur">'+T().pop_dur+' <input type="number" min="5" max="240" step="5" value="'+cur+'" onchange="setDur('+idx+',this.value)"/> min</div>';
 return '<b>'+p.name[LANG]+'</b> '+tag+'<br>'+p.desc[LANG]+'<br><span class="phr">'+p.hours[LANG]+'</span>'+crowd+d+durRow+'<a class="pop-go" target="_blank" rel="noopener" href="'+dir(p.lat,p.lng)+'">'+T().poi_go+'</a>';
}
POIS.forEach((p,idx)=>{
 const m=L.marker([p.lat,p.lng],{icon:poiIcon(p.cat)});
 m.bindPopup(()=>poiPopup(p,idx),{maxWidth:255});
 poiLayer.addLayer(m);poiMarkers.push(m);
});
poiLayer.addTo(map);
function applyCatFilter(){poiMarkers.forEach((m,i)=>{const on=activeCats.has(POIS[i].cat);if(on){if(!poiLayer.hasLayer(m))poiLayer.addLayer(m);}else{if(poiLayer.hasLayer(m))poiLayer.removeLayer(m);}});}
function toggleCat(cat){if(activeCats.has(cat))activeCats.delete(cat);else activeCats.add(cat);applyCatFilter();renderCatChips();}
function renderCatChips(){const ti=document.getElementById('t-cats');if(ti)ti.textContent=T().cats_title;const box=document.getElementById('catchips');if(!box)return;box.innerHTML='';POICATS.forEach(c=>{const on=activeCats.has(c[0]);const b=document.createElement('button');b.className='catchip'+(on?'':' off');b.innerHTML='<span class="cdot" style="background:'+c[3]+'"></span>'+(LANG==='fr'?c[1]:c[2]);b.onclick=()=>toggleCat(c[0]);box.appendChild(b);});}

// ---- rues ----
const streetLayers={tour:L.layerGroup(),calme:L.layerGroup(),scoot:L.layerGroup()};
STREETS.forEach(s=>{
 const pl=L.polyline(s.coords,{color:STREETCOL[s.cat],weight:8,opacity:0.5,lineCap:'round',lineJoin:'round'});
 pl.bindPopup(()=>'<b>'+s.name[LANG]+'</b><br>'+s.note[LANG],{maxWidth:230});
 streetLayers[s.cat].addLayer(pl);
});
streetLayers.tour.addTo(map);streetLayers.calme.addTo(map);streetLayers.scoot.addTo(map);

// ---- ma position ----
const locLayer=L.layerGroup().addTo(map);
const meIcon=L.divIcon({className:'',html:'<div class="me-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]});
let mePos=null, meMarker=null, placing=false;
function setMe(lat,lng){mePos={lat,lng};if(meMarker)meMarker.setLatLng([lat,lng]);else{meMarker=L.marker([lat,lng],{icon:meIcon});locLayer.addLayer(meMarker);}if(selId)renderCard(selId);}
function locate(then){
 toast(T().toast_locating);
 if(!navigator.geolocation){placing=true;toast(T().toast_loc_fail);return;}
 navigator.geolocation.getCurrentPosition(
  pos=>{setMe(pos.coords.latitude,pos.coords.longitude);map.setView([pos.coords.latitude,pos.coords.longitude],15);toast(T().toast_loc_ok);if(then)then();},
  ()=>{placing=true;toast(T().toast_loc_fail);},
  {enableHighAccuracy:true,timeout:8000});
}
map.on('click',e=>{if(placing){setMe(e.latlng.lat,e.latlng.lng);placing=false;toast(T().toast_loc_ok);}});

function haversine(a,b,c,d){const R=6371,r=Math.PI/180;const u=(c-a)*r,v=(d-b)*r;const x=Math.sin(u/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(v/2)**2;return 2*R*Math.asin(Math.sqrt(x));}
function gotoNearest(){
 const go=()=>{
  let bi=-1,bd=1e9;
  POIS.forEach((p,idx)=>{const dd=haversine(mePos.lat,mePos.lng,p.lat,p.lng);if(dd<bd){bd=dd;bi=idx;}});
  if(bi<0)return;
  const p=POIS[bi];
  if(!map.hasLayer(poiLayer))poiLayer.addTo(map);
  map.setView([p.lat,p.lng],15);
  poiMarkers[bi].openPopup();
  toast(T().nearest_found+p.name[LANG]+' ('+fmtDist(bd)+')');
  window.open(dir(p.lat,p.lng),'_blank');
 };
 if(mePos){go();return;}
 if(!navigator.geolocation){placing=true;toast(T().toast_need_pos);return;}
 toast(T().toast_locating);
 navigator.geolocation.getCurrentPosition(
  pos=>{setMe(pos.coords.latitude,pos.coords.longitude);go();},
  ()=>{placing=true;toast(T().toast_need_pos);},
  {enableHighAccuracy:true,timeout:8000});
}

// ---- parcours optimal d'une journee (vraies distances par les rues) ----
const START_DEFAULT={lat:41.38702,lng:2.17005};
const MODES={
 walk:{prof:'foot',gmaps:'walking'},
 bike:{prof:'bike',gmaps:'bicycling'},
 scooter:{prof:'car',gmaps:'driving'},
 car:{prof:'car',gmaps:'driving'},
 transit:{prof:'car',gmaps:'transit'},
};
const PROFSPEED={foot:4.6,bike:13,car:18};
let planMode='walk';
const routeLayer=L.layerGroup().addTo(map);
let lastPlan=null;
function curProf(){return MODES[planMode].prof;}
function hhmm(m){m=Math.round(m);const h=Math.floor(m/60)%24,mm=((m%60)+60)%60;return (h<10?'0':'')+h+'h'+(mm<10?'0':'')+mm;}
function pmin(v){const a=(v||'09:00').split(':');return (+a[0])*60+(+a[1]);}
// temps de trajet en minutes : matrice reelle entre POIs, estimation depuis le depart
function legMin(fi,fll,ti,tll){const pr=curProf();if(fi>=0&&ti>=0&&ROUTING.time[pr]){return ROUTING.time[pr][fi][ti];}const km=haversine(fll.lat,fll.lng,tll.lat,tll.lng)/1000*1.4;return km/PROFSPEED[pr]*60;}
function legDist(fi,fll,ti,tll){const pr=curProf();if(fi>=0&&ti>=0&&ROUTING.matrix[pr]){return ROUTING.matrix[pr][fi][ti];}return haversine(fll.lat,fll.lng,tll.lat,tll.lng)*1.4;}
// trace reel rue par rue entre deux POIs
function legPath(fi,ti){if(fi<0||ti<0)return null;const pr=curProf();const a=Math.min(fi,ti),b=Math.max(fi,ti);const pp=ROUTING.paths[pr]&&ROUTING.paths[pr][a+'_'+b];if(!pp)return null;let ll=pp.map(c=>[c[1],c[0]]);if(fi>ti)ll=ll.slice().reverse();return ll;}
function durOf(o){return (durOv[o.idx]!=null?durOv[o.idx]:o.p.dur);}
function numIcon(n){return L.divIcon({className:'',html:'<div class="num">'+n+'</div>',iconSize:[26,26],iconAnchor:[13,13]});}
function setMode(m){planMode=m;['walk','bike','scooter','car','transit'].forEach(x=>{const btn=document.getElementById('m-'+x);if(btn)btn.classList.toggle('on',x===m);});}
function fillDays(){const sel=document.getElementById('p-day');const cur=sel.value!==''?+sel.value:new Date().getDay();sel.innerHTML='';T().plan_days.forEach((d,i)=>{const o=document.createElement('option');o.value=i;o.textContent=d;if(i===cur)o.selected=true;sel.appendChild(o);});}
function mapsRoute(stops,start){if(!stops.length)return '#';const pts=stops.map(s=>s.p.lat+','+s.p.lng);const origin=start.lat+','+start.lng;const dest=pts[pts.length-1];const way=pts.slice(0,-1).join('|');let u='https://www.google.com/maps/dir/?api=1&origin='+origin+'&destination='+dest+'&travelmode='+MODES[planMode].gmaps;if(way)u+='&waypoints='+encodeURIComponent(way);return u;}
function poiOpen(p,day){return (p.alt&&p.alt[day])?p.alt[day][0]:p.open;}
function poiClose(p,day){return (p.alt&&p.alt[day])?p.alt[day][1]:p.close;}
function pathLen(start,order){if(!order.length)return 0;let L=legDist(-1,start,order[0].idx,order[0].p);for(let i=0;i<order.length-1;i++)L+=legDist(order[i].idx,order[i].p,order[i+1].idx,order[i+1].p);return L;}
function nnOrder(start,pool){let order=[],ci=-1,cl={lat:start.lat,lng:start.lng},rem=pool.slice();while(rem.length){let bi=0,bd=1e15;rem.forEach((o,i)=>{const d=legDist(ci,cl,o.idx,o.p);if(d<bd){bd=d;bi=i;}});const x=rem.splice(bi,1)[0];order.push(x);ci=x.idx;cl={lat:x.p.lat,lng:x.p.lng};}return order;}
function twoOptOrder(start,order){if(order.length<3)return order;let best=order.slice(),imp=true,g=0;while(imp&&g++<60){imp=false;for(let i=0;i<best.length-1;i++)for(let k=i+1;k<best.length;k++){const c=best.slice(0,i).concat(best.slice(i,k+1).reverse(),best.slice(k+1));if(pathLen(start,c)<pathLen(start,best)-1e-6){best=c;imp=true;}}}return best;}
function planRoute(startMin,endMin,start,day){
 const cand=[];POIS.forEach((p,idx)=>{if(!activeCats.has(p.cat))return;if(!p.open24&&p.closedDays&&p.closedDays.indexOf(day)>=0)return;cand.push({idx,p});});
 let reserve=cand.find(o=>o.p.name.fr.indexOf('Bunkers')>=0)||null;
 const pool=cand.filter(o=>o!==reserve);
 const order=twoOptOrder(start,nnOrder(start,pool));
 let t=startMin,ci=-1,cl={lat:start.lat,lng:start.lng},route=[],skipped=[];
 order.forEach(o=>{const p=o.p;const tr=legMin(ci,cl,o.idx,p);const arr=t+tr;const eff=p.open24?arr:Math.max(arr,poiOpen(p,day));const dd=durOf(o);const fin=eff+dd;if(fin<=Math.min(poiClose(p,day),endMin)){route.push({p,idx:o.idx,arr:eff,dep:fin,dur:dd});t=fin;ci=o.idx;cl={lat:p.lat,lng:p.lng};}else{skipped.push(o);}});
 let changed=true,guard=0;
 while(changed&&guard++<40){changed=false;
  for(let s=0;s<skipped.length;s++){const o=skipped[s];let done=false;
   for(let pos=0;pos<=route.length&&!done;pos++){
    const test=route.slice(0,pos).map(r=>({idx:r.idx,p:r.p})).concat([{idx:o.idx,p:o.p}],route.slice(pos).map(r=>({idx:r.idx,p:r.p})));
    let tt=startMin,xi=-1,xl={lat:start.lat,lng:start.lng},ok=true,sim=[];
    for(const stp of test){const p=stp.p;const tr=legMin(xi,xl,stp.idx,p);const arr=tt+tr;const eff=p.open24?arr:Math.max(arr,poiOpen(p,day));const dd=durOf(stp);const fin=eff+dd;if(fin>Math.min(poiClose(p,day),endMin)){ok=false;break;}sim.push({p,idx:stp.idx,arr:eff,dep:fin,dur:dd});tt=fin;xi=stp.idx;xl={lat:p.lat,lng:p.lng};}
    if(ok){route=sim;skipped.splice(s,1);s--;changed=true;done=true;}
   }
  }
 }
 if(reserve){const p=reserve.p;const lastDep=route.length?route[route.length-1].dep:startMin;const li=route.length?route[route.length-1].idx:-1;const lll=route.length?{lat:route[route.length-1].p.lat,lng:route[route.length-1].p.lng}:start;const tr=legMin(li,lll,reserve.idx,p);const arr=lastDep+tr;const dd=durOf(reserve);const cap=Math.min(poiClose(p,day),endMin);let st=Math.max(arr,cap-dd);const fin=st+dd;if(arr<=cap+5&&st>=(p.open24?0:poiOpen(p,day))){route.push({p,idx:reserve.idx,arr:st,dep:fin,dur:dd,golden:true});}else{skipped.push(reserve);}}
 return {route,skipped:skipped.map(o=>o.p),start,startMin,endMin};
}
function runPlan(){
 const startMin=pmin(document.getElementById('p-start').value);
 const endMin=pmin(document.getElementById('p-sunset').value);
 const day=+document.getElementById('p-day').value;
 let start,est=false;
 if(mePos){start={lat:mePos.lat,lng:mePos.lng};}else{est=true;toast(T().plan_need_loc);start=START_DEFAULT;}
 lastPlan=planRoute(startMin,endMin,start,day);lastPlan.est=est;
 renderPlan(lastPlan);
}
function renderPlan(res){
 const t=T();routeLayer.clearLayers();
 const out=document.getElementById('plan-out');
 if(!res.route.length){out.innerHTML='<p class="psk">'+t.plan_none+'</p>';return;}
 let allpts=[[res.start.lat,res.start.lng]];
 let prevI=-1,prevLL={lat:res.start.lat,lng:res.start.lng};
 res.route.forEach((s,i)=>{
  const rp=legPath(prevI,s.idx);
  if(rp&&rp.length>1){L.polyline(rp,{color:'#f0a020',weight:4,opacity:.9,lineCap:'round',lineJoin:'round'}).addTo(routeLayer);rp.forEach(x=>allpts.push(x));}
  else{const seg=[[prevLL.lat,prevLL.lng],[s.p.lat,s.p.lng]];L.polyline(seg,{color:'#f0a020',weight:3,opacity:.65,dashArray:'2,9',lineCap:'round'}).addTo(routeLayer);allpts.push([s.p.lat,s.p.lng]);}
  L.marker([s.p.lat,s.p.lng],{icon:numIcon(i+1)}).addTo(routeLayer);
  prevI=s.idx;prevLL={lat:s.p.lat,lng:s.p.lng};
 });
 if(!map.hasLayer(routeLayer))routeLayer.addTo(map);
 let li='';
 res.route.forEach((s,i)=>{
  const cc=POICAT[s.p.cat]||{};const tag='<span class="pcat" style="background:'+(cc.col||'#888')+'">'+(cc[LANG]||'')+'</span>';
  li+='<li><span class="ph">'+hhmm(s.arr)+'</span><b>'+s.p.name[LANG]+'</b> '+tag+' <span class="pd">'+s.dur+' min '+t.plan_visit+'</span><br><span class="phr">'+s.p.hours[LANG]+'</span>'+(s.p.crowd?'<br><span class="pcr">\u25f7 '+s.p.crowd[LANG]+'</span>':'')+(s.golden?'<br><span class="pg">'+t.plan_golden+'</span>':'')+'</li>';
 });
 let sk='';
 if(res.skipped.length){sk='<p class="psk">'+t.plan_skipped+'<br>'+res.skipped.map(p=>p.name[LANG]).join(', ')+'</p>';}
 const estn=res.est?'<p class="psk">'+t.plan_est_loc+'</p>':'';
 out.innerHTML='<div class="card" style="margin-top:12px">'+
  '<h2>'+t.plan_title+'</h2>'+
  '<div class="meta"><span>'+res.route.length+' '+t.plan_count+'</span><span>\u00b7</span><span>'+t['plan_'+planMode]+'</span></div>'+
  estn+
  '<ol class="plan-list">'+li+'</ol>'+
  '<a class="go" target="_blank" rel="noopener" href="'+mapsRoute(res.route,res.start)+'">\u2192 '+t.plan_maps+'</a>'+sk+
  '<p class="pnote">'+t.plan_note+'</p></div>';
 try{map.fitBounds(L.latLngBounds(allpts).pad(0.15));}catch(e){}
}
function clearPlan(){routeLayer.clearLayers();lastPlan=null;document.getElementById('plan-out').innerHTML='';}

// ---- toast ----
let toastT=null;
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),4200);}

// ---- init ----
applyLang();renderRamp();renderLegend();renderChips();renderCatChips();buildLayerCtl();syncBtns();
